name: AEOS Kernel Runner

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Debug full structure
        run: |
          echo "WORKSPACE: $GITHUB_WORKSPACE"
          pwd
          ls -R

      # 🔥 CRITICAL FIX: NO CACHE (temporary)
      - name: Setup Node (NO CACHE)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Force correct directory + verify lockfile
        run: |
          cd $GITHUB_WORKSPACE
          echo "=== FILES ==="
          ls -la
          echo "=== LOCKFILE CHECK ==="
          test -f package-lock.json && echo "LOCKFILE OK" || (echo "NO LOCKFILE HERE" && exit 1)

      - name: Install dependencies
        run: |
          cd $GITHUB_WORKSPACE
          npm ci

      - name: Run Kernel
        run: |
          cd $GITHUB_WORKSPACE
          node kernel-runner.js
        env:
          BASE44_APP_ID: ${{ secrets.BASE44_APP_ID }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
