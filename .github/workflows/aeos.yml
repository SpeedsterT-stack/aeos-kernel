name: DEBUG AEOS

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show structure
        run: ls -R

      - name: Check lockfile
        run: stat package-lock.json

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci --verbose

      - name: Run
        run: node kernel-runner.js
