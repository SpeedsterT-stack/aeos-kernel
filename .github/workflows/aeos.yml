name: AEOS Kernel Runner

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Show repo structure (DEBUG)
        run: |
          echo "WORKSPACE: $GITHUB_WORKSPACE"
          pwd
          ls -R

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 🔥 CRITICAL FIX: force correct folder
      - name: Install dependencies
        run: |
          cd $GITHUB_WORKSPACE
          ls -la
          npm ci

      - name: Run Kernel
        run: |
          cd $GITHUB_WORKSPACE
          node kernel-runner.js
        env:
          BASE44_APP_ID: ${{ secrets.BASE44_APP_ID }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
