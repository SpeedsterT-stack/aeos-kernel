name: AEOS Production Kernel

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install deps
        run: npm ci

      - name: ENV Guard
        run: |
          if [ -z "${{ secrets.BASE44_APP_ID }}" ]; then echo "NO APP ID" && exit 1; fi
          if [ -z "${{ secrets.BASE44_API_KEY }}" ]; then echo "NO API KEY" && exit 1; fi

      - name: Run AEOS Kernel
        env:
          BASE44_APP_ID: ${{ secrets.BASE44_APP_ID }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
        run: node kernel-runner.js
