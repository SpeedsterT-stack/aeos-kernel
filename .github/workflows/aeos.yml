name: AEOS Kernel Runner

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Debug workspace structure
        run: |
          echo "WORKSPACE: $GITHUB_WORKSPACE"
          pwd
          ls -la
          echo "---- FULL TREE ----"
          ls -R

      # ✅ FIXED: setup-node without cache (avoids lockfile detection issues)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ HARD GUARD: ensure lockfile exists where CI runs
      - name: Validate lockfile
        run: |
          cd $GITHUB_WORKSPACE
          if [ ! -f package-lock.json ]; then
            echo "❌ package-lock.json missing in root"
            exit 1
          fi
          echo "✅ package-lock.json found"

      # ⚡ Clean install (CI-safe)
      - name: Install dependencies
        run: |
          cd $GITHUB_WORKSPACE
          npm ci

      # 🚀 Run kernel
      - name: Run AEOS Kernel
        run: |
          cd $GITHUB_WORKSPACE
          node kernel-runner.js
        env:
          BASE44_APP_ID: ${{ secrets.BASE44_APP_ID }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
