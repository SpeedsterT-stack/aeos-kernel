- name: Checkout repo
  uses: actions/checkout@v4

- name: Setup Node
  uses: actions/setup-node@v4
  with:
    node-version: 24
    cache: ""

- name: Install dependencies
  run: npm ci

- name: Run Kernel
  run: node kernel-runner.js
  env:
    BASE44_APP_ID: ${{ secrets.BASE44_APP_ID }}
    BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
